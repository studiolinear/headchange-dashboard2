<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="toolbar">
  <div class="toolbar-inner">
    <span id="saveStatus" class="save-status"></span>
    <button id="copyLinkBtn" class="tb-btn tb-btn-ghost">Copy client (view-only) link</button>
    <button id="resetBtn" class="tb-btn tb-btn-ghost">Reset to original</button>
    <button id="editBtn" class="tb-btn">Edit dashboard</button>
    <button id="saveBtn" class="tb-btn tb-btn-primary" style="display:none;">Save changes</button>
  </div>
</div>

<div id="app">Loading dashboard…</div>

<script src="app.js"></script>
</body>
</html>
